<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            display: none;
            background-image: url("bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: rgba(255,255,255,0.75);
            background-blend-mode: lighten;
            color: #000;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding-bottom: 16px;
            border-bottom: 2px solid #ffffff;
            margin-bottom: 30px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-buttons {
            display: flex;
            gap: 16px;
        }
        .logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        .title-text {
            font-size: 18px;
            font-weight: bold;
            color: #0044cc;
        }
        .tip-btn {
            padding: 10px 26px;
            border: 2px solid #000;
            border-radius: 9999px;
            background: rgba(255,255,0.8);
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tip-btn:hover { background: #e8f0ff; }
        .modal-mask {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0.5);
            z-index: 99;
            align-items: center;
            justify-content: center;
            padding: 8px;
            overflow-y: auto;
        }
        #tipMask .modal-box {
            width: 50vw;
            min-height: 40vh;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            font-size: 22px;
            line-height: 1.8;
        }
        #forecastMask .modal-box {
            width: 85vw;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-close {
            margin-top: 30px;
            padding: 8px 24px;
            font-size: 18px;
            cursor: pointer;
        }
        .forecast-top-bar {
            background-color: #2277dd;
            color: white;
            font-size: 36px;
            padding: 20px 30px;
            font-weight: bold;
        }
        .forecast-week-wrap {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            padding: 20px;
            background: #fff;
        }
        .forecast-day-card {
            background-color: #cce0ff;
            border-radius: 6px;
            text-align: center;
            padding: 12px 6px;
            position: relative;
        }
        .forecast-date { font-size: 28px; margin-bottom: 16px; }
        .forecast-icon-box {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .forecast-icon { font-size: 60px; margin: 12px 0; }
        .forecast-tip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 16px;
            white-space: nowrap;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .forecast-icon-box:hover .forecast-tip { visibility: visible; opacity: 1; }
        .forecast-high {
            font-size: 36px;
            color: #ff7700;
            font-weight: bold;
            margin: 8px 0;
        }
        .forecast-low {
            font-size: 36px;
            color: #0055cc;
            font-weight: bold;
        }
        .forecast-release {
            padding: 0 30px;
            font-size: 22px;
            color: #555;
        }
        .station-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 60px;
        }
        .weather-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 60px;
            margin-bottom: 100px;
            border: 2px solid transparent;
            border-radius: 9999px;
            padding: 40px 60px;
            background-color: transparent;
            max-width: fit-content;
        }
        .temp-block { text-align: center; }
        .temp-num { font-size: 90px; font-weight: bold; }
        .wind-info {
            font-size: 28px;
            margin-top: 12px;
            font-family: "KaiTi", "楷体", serif;
        }
        .data-list { font-size: 30px; line-height: 2.2; }
        .data-list span, .data-list div {
            font-family: "KaiTi", "楷体", serif;
            color: #555;
        }
        .data-list span {
            display: inline-block;
            width: 140px;
        }
        .divider-wrap { position: relative; margin: 20px 0; }
        .divider { border-bottom: 2px solid #ffffff; }
        .publishing-time {
            position: absolute;
            right: 0;
            bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #0044cc;
            padding: 6px 14px;
            background: rgba(255,255,0.75);
            border-radius: 6px;
        }
        .func-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 24px;
            color: #0044cc;
        }
        .func-links {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }
        .func-item a {
            display: block;
            text-align: center;
            font-weight: bold;
            padding: 16px 8px;
            border: 0.5px solid #f7e086;
            border-radius: 9999px;
            text-decoration: none;
            color: #000;
            transition: 0.2s;
            background-color: rgba(255,255,0.8);
        }
        .func-item:first-child a { font-size: 18px; }
        .func-item:not(:first-child) a { font-size: 20px; }
        .func-item a:hover { background: #f0f4f9; }
        @media (max-width: 768px) {
            body{padding:15px}
            .header{flex-direction:column;gap:10px;padding-bottom:10px}
            .header-left{justify-content:center}
            .title-text{font-size:14px}
            .tip-btn{padding:5px 12px;font-size:13px}
            .modal-mask{padding:4px}
            #tipMask .modal-box{
                width:94vw;
                min-height:auto;
                padding:14px;
                font-size:16px;
                line-height:1.4;
            }
            #forecastMask .modal-box{width:99vw}
            .forecast-top-bar{font-size:16px;padding:6px 10px}
            .forecast-week-wrap{grid-template-columns:repeat(3,1fr);gap:4px;padding:6px}
            .forecast-day-card{padding:4px 1px;border-radius:3px}
            .forecast-date{font-size:12px;margin-bottom:2px}
            .forecast-icon{font-size:24px;margin:2px 0}
            .forecast-high,.forecast-low{font-size:16px;margin:1px 0;line-height:1}
            .forecast-release{font-size:11px;padding:0 6px 4px}
            #forecastMask .modal-close{margin-top:6px;padding:3px;width:100%;font-size:12px}
            .station-title{font-size:28px;margin-bottom:25px;text-align:center}
            .weather-container{
                flex-direction:column;
                gap:25px;
                padding:30px 20px;
                margin-bottom:35px;
                max-width:100%;
                width:100%;
                background-color: transparent;
                border: none;
            }
            .temp-num{font-size:70px}
            .wind-info{font-size:22px;margin-top:15px}
            .data-list{font-size:22px;text-align:center;line-height:1.8}
            .data-list span{
                display:block;
                margin:0 auto 8px;
                width:auto;
                font-weight: bold;
            }
            .publishing-time{font-size:14px;padding:4px 8px;bottom:-5px}
            .func-title{font-size:20px;text-align:center;margin-bottom:15px}
            .func-links{grid-template-columns:1fr 1fr;gap:10px}
            .func-item a{padding:12px 8px;font-size:16px;border-width:0.3px}
            @media (max-width:420px) {
                .forecast-week-wrap{grid-template-columns:repeat(2,1fr)}
                .func-links{grid-template-columns:1fr}
                .station-title{font-size:24px}
                .temp-num{font-size:60px}
                .wind-info{font-size:20px}
                .data-list{font-size:20px}
                .weather-container{padding:25px 15px}
            }
        }
    </style>
</head>
<body>
    <!-- 仅空容器，无任何文字数据 -->
    <div class="header">
        <div class="header-left">
            <img class="logo" id="logoImg" alt="">
            <div class="title-text" id="headerTitle"></div>
        </div>
        <div class="header-buttons">
            <div class="tip-btn" id="openForecast"></div>
            <div class="tip-btn" id="openTip"></div>
        </div>
    </div>

    <div class="modal-mask" id="tipMask">
        <div class="modal-box" id="tipContent"></div>
    </div>

    <div class="modal-mask" id="forecastMask">
        <div class="modal-box">
            <div class="forecast-top-bar" id="forecastTitle"></div>
            <div class="forecast-week-wrap" id="forecastDaysWrap"></div>
            <div class="forecast-release" id="forecastReleaseTime"></div>
            <button class="modal-close" id="closeForecast"></button>
        </div>
    </div>

    <div class="station-title" id="stationTitle"></div>
    <div class="weather-container">
        <div class="temp-block">
            <div class="temp-num" id="realtimeTemp"></div>
            <div class="wind-info" id="realtimeWind"></div>
        </div>
        <div class="data-list">
            <div><span>相对湿度</span> <span id="realtimeHumidity"></span></div>
            <div><span>时雨量</span> <span id="realtimeHourlyRain"></span></div>
            <div><span>日雨量</span> <span id="realtimeDailyRain"></span></div>
        </div>
    </div>

    <div class="divider-wrap">
        <div class="publishing-time" id="realtimePublishTime"></div>
        <div class="divider"></div>
    </div>

    <div class="func-title" id="funcLinksTitle"></div>
    <div class="func-links" id="funcLinksWrap"></div>

<script>
window.addEventListener('DOMContentLoaded', loadData);

async function loadData(){
    try {
        const res = await fetch('weather-data.json');
        if(!res.ok) throw "JSON文件不存在/路径错误";
        const data = await res.json();
        renderAll(data);
        document.body.style.display = 'block';
    } catch(err) {
        alert("数据加载失败："+err+"\n请使用服务器打开页面，不要本地双击HTML");
        console.error(err);
    }
}

function renderAll(data){
    // 站点基础
    document.getElementById('pageTitle').textContent = data.siteInfo.title;
    document.getElementById('logoImg').src = data.siteInfo.logoSrc;
    document.getElementById('headerTitle').textContent = data.siteInfo.title;
    document.body.style.backgroundImage = `url(${data.siteInfo.bgSrc})`;

    // 提示弹窗
    const tipBtn = document.getElementById('openTip');
    tipBtn.textContent = data.weatherTip.buttonText;
    const tipBox = document.getElementById('tipContent');
    tipBox.innerHTML = `${data.weather.content}<br><button class="modal-close" id="closeTip">${data.weatherTip.closeButtonText}</button>`;
    // 提示弹窗事件（内部绑定，不会失效）
    tipBtn.onclick = ()=>document.getElementById('tipMask').style.display='flex';
    document.getElementById('tipMask').onclick = e=>{
        if(e.target.id === 'tipMask') document.getElementById('tipMask').style.display='none';
    };
    document.getElementById('closeTip').onclick = ()=>document.getElementById('tipMask').style.display='none';

    // 天气预报按钮与标题
    document.getElementById('openForecast').textContent = data.forecast.buttonText;
    document.getElementById('forecastTitle').textContent = data.forecast.title;
    document.getElementById('forecastReleaseTime').textContent = data.forecast.releaseTime;
    document.getElementById('closeForecast').textContent = data.forecast.closeButtonText;
    // 预报弹窗事件
    const forecastBtn = document.getElementById('openForecast');
    const forecastMask = document.getElementById('forecastMask');
    const closeForecast = document.getElementById('closeForecast');
    forecastBtn.onclick = ()=>forecastMask.style.display='flex';
    forecastMask.onclick = e=>{
        if(e.target === forecastMask) forecastMask.style.display='none';
    };
    closeForecast.onclick = ()=>forecastMask.style.display='none';

    // 生成预报卡片
    const wrap = document.getElementById('forecastDaysWrap');
    wrap.innerHTML = "";
    data.forecast.days.forEach(d=>{
        const card = document.createElement('div');
        card.className = "forecast-day-card";
        card.innerHTML = `
            <div class="forecast-date">${d.date}</div>
            <div class="forecast-icon-box">
                <div class="forecast-icon">${d.icon}</div>
                <div class="forecast-tip">${d.tip}</div>
            </div>
            <div class="forecast-high">${d.highTemp}</div>
            <div class="forecast-low">${d.lowTemp}</div>
        `;
        wrap.appendChild(card);
    })

    // 实况数据
    document.getElementById('stationTitle').textContent = data.realtimeData.stationTitle;
    document.getElementById('realtimeTemp').textContent = data.realtimeData.temperature;
    document.getElementById('realtimeWind').textContent = data.realtimeData.wind;
    document.getElementById('realtimeHumidity').textContent = data.realtimeData.humidity;
    document.getElementById('realtimeHourlyRain').textContent = data.realtimeData.hourlyRain;
    document.getElementById('realtimeDailyRain').textContent = data.realtimeData.dailyRain;
    document.getElementById('realtimePublishTime').textContent = data.realtimeData.publishTime;

    // 底部链接
    document.getElementById('funcLinksTitle').textContent = data.functionLinks.title;
    const linkWrap = document.getElementById('funcLinksWrap');
    link.innerHTML = "";
    data.functionLinks.links.forEach(item=>{
        const div = document.createElement('div');
        div.className = "func-item";
        div.innerHTML = `<a href="${item.url}">${item.text}</a>`;
        linkWrap.appendChild(div);
    })
}
</script>
</body>
</html>
