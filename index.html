<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">宝安中学气象社 BAMC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-image: url("bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: rgba(255,255,255,0.75);
            background-blend-mode: lighten;
            color: #000;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding-bottom: 16px;
            border-bottom: 2px solid #ffffff;
            margin-bottom: 30px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-buttons {
            display: flex;
            gap: 16px;
        }
        .logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        .title-text {
            font-size: 18px;
            font-weight: bold;
            color: #0044cc;
        }
        .tip-btn {
            padding: 10px 26px;
            border: 2px solid #000;
            border-radius: 9999px;
            background: rgba(255,255,255,0.8);
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tip-btn:hover { background: #e8f0ff; }
        .modal-mask {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            align-items: center;
            justify-content: center;
            padding: 8px;
            overflow-y: auto;
        }
        #tipMask .modal-box {
            width: 50vw;
            min-height: 40vh;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            font-size: 22px;
            line-height: 1.8;
        }
        #forecastMask .modal-box {
            width: 85vw;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-close {
            margin-top: 30px;
            padding: 8px 24px;
            font-size: 18px;
            cursor: pointer;
        }
        .forecast-top-bar {
            background-color: #2277dd;
            color: white;
            font-size: 36px;
            padding: 20px 30px;
            font-weight: bold;
        }
        .forecast-week-wrap {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            padding: 20px;
            background: #fff;
        }
        .forecast-day-card {
            background-color: #cce0ff;
            border-radius: 6px;
            text-align: center;
            padding: 12px 6px;
            position: relative;
        }
        .forecast-date { font-size: 28px; margin-bottom: 16px; }
        .forecast-icon-box {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .forecast-icon { font-size: 60px; margin: 12px 0; }
        .forecast-tip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 16px;
            white-space: nowrap;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .forecast-icon-box:hover .forecast-tip { visibility: visible; opacity: 1; }
        .forecast-high {
            font-size: 36px;
            color: #ff7700;
            font-weight: bold;
            margin: 8px 0;
        }
        .forecast-low {
            font-size: 36px;
            color: #0055cc;
            font-weight: bold;
        }
        .forecast-release {
            padding: 0 30px;
            font-size: 22px;
            color: #555;
        }
        .station-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 60px;
        }
        .weather-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 60px;
            margin-bottom: 100px;
            border: 2px solid transparent;
            border-radius: 9999px;
            padding: 40px 60px;
            background-color: transparent;
            max-width: fit-content;
        }
        .temp-block { text-align: center; }
        .temp-num { font-size: 90px; font-weight: bold; }
        .wind-info {
            font-size: 28px;
            margin-top: 12px;
            font-family: "KaiTi", "楷体", serif;
        }
        .data-list { font-size: 30px; line-height: 2.2; }
        .data-list span, .data-list div {
            font-family: "KaiTi", "楷体", serif;
            color: #555;
        }
        .data-list span {
            display: inline-block;
            width: 140px;
        }
        .divider-wrap { position: relative; margin: 20px 0; }
        .divider { border-bottom: 2px solid #ffffff; }
        .publishing-time {
            position: absolute;
            right: 0;
            bottom: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #0044cc;
            padding: 6px 14px;
            background: rgba(255,255,255,0.75);
            border-radius: 6px;
        }
        .func-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 24px;
            color: #0044cc;
        }
        .func-links {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }
        .func-item a {
            display: block;
            text-align: center;
            font-weight: bold;
            padding: 16px 8px;
            border: 0.5px solid #f7e086;
            border-radius: 9999px;
            text-decoration: none;
            color: #000;
            transition: 0.2s;
            background-color: rgba(255,255,255,0.8);
        }
        .func-item:first-child a { font-size: 18px; }
        .func-item:not(:first-child) a { font-size: 20px; }
        .func-item a:hover { background: #f0f4f9; }
        @media (max-width: 768px) {
            body{padding:15px}
            .header{flex-direction:column;gap:10px;padding-bottom:10px}
            .header-left{justify-content:center}
            .title-text{font-size:14px}
            .tip-btn{padding:5px 12px;font-size:13px}
            .modal-mask{padding:4px}
            #tipMask .modal-box{
                width:94vw;
                min-height:auto;
                padding:14px;
                font-size:16px;
                line-height:1.4;
            }
            #forecastMask .modal-box{width:99vw}
            .forecast-top-bar{font-size:16px;padding:6px 10px}
            .forecast-week-wrap{grid-template-columns:repeat(3,1fr);gap:4px;padding:6px}
            .forecast-day-card{padding:4px 1px;border-radius:3px}
            .forecast-date{font-size:12px;margin-bottom:2px}
            .forecast-icon{font-size:24px;margin:2px 0}
            .forecast-high,.forecast-low{font-size:16px;margin:1px 0;line-height:1}
            .forecast-release{font-size:11px;padding:0 6px 4px}
            #forecastMask .modal-close{margin-top:6px;padding:3px;width:100%;font-size:12px}
            .station-title{font-size:28px;margin-bottom:25px;text-align:center}
            .weather-container{
                flex-direction:column;
                gap:25px;
                padding:30px 20px;
                margin-bottom:35px;
                max-width:100%;
                width:100%;
                background-color: transparent;
                border: none;
            }
            .temp-num{font-size:70px}
            .wind-info{font-size:22px;margin-top:15px}
            .data-list{font-size:22px;text-align:center;line-height:1.8}
            .data-list span{
                display:block;
                margin:0 auto 8px;
                width:auto;
                font-weight: bold;
            }
            .publishing-time{font-size:14px;padding:4px 8px;bottom:-5px}
            .func-title{font-size:20px;text-align:center;margin-bottom:15px}
            .func-links{grid-template-columns:1fr 1fr;gap:10px}
            .func-item a{padding:12px 8px;font-size:16px;border-width:0.3px}
            @media (max-width:420px) {
                .forecast-week-wrap{grid-template-columns:repeat(2,1fr)}
                .func-links{grid-template-columns:1fr}
                .station-title{font-size:24px}
                .temp-num{font-size:60px}
                .wind-info{font-size:20px}
                .data-list{font-size:20px}
                .weather-container{padding:25px 15px}
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img class="logo" id="logoImg" src="logo.png" alt="宝安中学气象社logo">
            <div class="title-text" id="headerTitle">宝安中学气象社 BAMC</div>
        </div>
        <div class="header-buttons">
            <div class="tip-btn" id="openForecast">天气预报</div>
            <div class="tip-btn" id="openTip">天气提示</div>
        </div>
    </div>
    <div class="modal-mask" id="tipMask">
        <div class="modal-box" id="tipContent">
            预计未来两天有大雨到暴雨，并伴有雷电和短时大风。
            <br><br>
            点击下方按钮或空白区域可关闭。
            <br>
            <button class="modal-close" id="closeTip">关闭提示</button>
        </div>
    </div>
    <div class="modal-mask" id="forecastMask">
        <div class="modal-box">
            <div class="forecast-top-bar" id="forecastTitle">深圳市7天天气预报</div>
            <div class="forecast-week-wrap" id="forecastDaysWrap">
                <!-- 天气预报天数卡片由JS动态生成 -->
            </div>
            <div class="forecast-release" id="forecastReleaseTime">2026-06-26 15:15</div>
            <button class="modal-close" id="closeForecast">关闭预报</button>
        </div>
    </div>
    <div class="station-title" id="stationTitle">宝安中学实况</div>
    <div class="weather-container">
        <div class="temp-block">
            <div class="temp-num" id="realtimeTemp">27.9℃</div>
            <div class="wind-info" id="realtimeWind">偏南风 1 级</div>
        </div>
        <div class="data-list">
            <div><span>相对湿度</span> <span id="realtimeHumidity">86%</span></div>
            <div><span>时雨量</span> <span id="realtimeHourlyRain">0mm</span></div>
            <div><span>日雨量</span> <span id="realtimeDailyRain">18mm</span></div>
        </div>
    </div>
    <div class="divider-wrap">
        <div class="publishing-time" id="realtimePublishTime">发布时间 06-26 15:15</div>
        <div class="divider"></div>
    </div>
    <div class="func-title" id="funcLinksTitle">其它网站</div>
    <div class="func-links" id="funcLinksWrap">
        <!-- 功能链接由JS动态生成 -->
    </div>

<script>
    // 加载JSON数据并渲染页面
    fetch('weather-data.json')
        .then(response => response.json())
        .then(data => {
            // 1. 渲染站点基础信息
            document.getElementById('pageTitle').textContent = data.siteInfo.title;
            document.getElementById('logoImg').src = data.siteInfo.logoSrc;
            document.body.style.backgroundImage = `url("${data.siteInfo.bgSrc}")`;
            document.getElementById('headerTitle').textContent = data.siteInfo.title;

            // 2. 渲染天气提示
            document.getElementById('openTip').textContent = data.weatherTip.buttonText;
            document.getElementById('tipContent').innerHTML = `${data.weatherTip.content}<br><button class="modal-close" id="closeTip">${data.weatherTip.closeButtonText}</button>`;
            document.getElementById('closeTip').onclick = () => tipMask.style.display = 'none';

            // 3. 渲染天气预报
            document.getElementById('openForecast').textContent = data.forecast.buttonText;
            document.getElementById('forecastTitle').textContent = data.forecast.title;
            document.getElementById('forecastReleaseTime').textContent = data.forecast.releaseTime;
            document.getElementById('closeForecast').textContent = data.forecast.closeButtonText;
            
            // 生成7天预报卡片
            const forecastWrap = document.getElementById('forecastDaysWrap');
            forecastWrap.innerHTML = '';
            data.forecast.days.forEach(day => {
                const dayCard = document.createElement('div');
                dayCard.className = 'forecast-day-card';
                dayCard.innerHTML = `
                    <div class="forecast-date">${day.date}</div>
                    <div class="forecast-icon-box">
                        <div class="forecast-icon">${day.icon}</div>
                        <div class="forecast-tip">${day.tip}</div>
                    </div>
                    <div class="forecast-high">${day.highTemp}</div>
                    <div class="forecast-low">${day.lowTemp}</div>
                `;
                forecastWrap.appendChild(dayCard);
            });

            // 4. 渲染实况数据
            document.getElementById('stationTitle').textContent = data.realtimeData.stationTitle;
            document.getElementById('realtimeTemp').textContent = data.realtimeData.temperature;
            document.getElementById('realtimeWind').textContent = data.realtimeData.wind;
            document.getElementById('realtimeHumidity').textContent = data.realtimeData.humidity;
            document.getElementById('realtimeHourlyRain').textContent = data.realtimeData.hourlyRain;
            document.getElementById('realtimeDailyRain').textContent = data.realtimeData.dailyRain;
            document.getElementById('realtimePublishTime').textContent = data.realtimeData.publishTime;

            // 5. 渲染功能链接
            document.getElementById('funcLinksTitle').textContent = data.functionLinks.title;
            const funcLinksWrap = document.getElementById('funcLinksWrap');
            funcLinksWrap.innerHTML = '';
            data.functionLinks.links.forEach(link => {
                const linkItem = document.createElement('div');
                linkItem.className = 'func-item';
                linkItem.innerHTML = `<a href="${link.url}">${link.text}</a>`;
                funcLinksWrap.appendChild(linkItem);
            });
        })
        .catch(error => console.error('加载JSON数据失败:', error));

    // 模态框基础交互
    const openTip = document.getElementById('openTip');
    const tipMask = document.getElementById('tipMask');
    openTip.onclick = () => tipMask.style.display = 'flex';
    tipMask.onclick = (e) => { if(e.target === tipMask) tipMask.style.display = 'none' };

    const openForecast = document.getElementById('openForecast');
    const forecastMask = document.getElementById('forecastMask');
    const closeForecast = document.getElementById('closeForecast');
    openForecast.onclick = () => forecastMask.style.display = 'flex';
    closeForecast.onclick = () => forecastMask.style.display = 'none';
    forecastMask.onclick = (e) => { if(e.target === forecastMask) forecastMask.style.display = 'none' };
</script>
</body>
</html>
